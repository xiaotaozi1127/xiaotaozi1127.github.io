<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xiaotaozi1127 – Apps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #faf8f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #1a1a1a; }
    p { color: #666; margin-bottom: 2rem; font-size: 1rem; line-height: 1.6; }
    .app-list { display: flex; flex-direction: column; gap: 1rem; }
    .btn {
      display: block;
      padding: 0.875rem 1.5rem;
      border-radius: 10px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      background: #4f46e5;
      color: #fff;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: #4338ca; }
    .btn:active { transform: scale(0.98); }
    footer {
      margin-top: 2rem;
      color: #999;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>xiaotaozi1127</h1>
    <p>Legal documents for my apps.</p>
    <div class="app-list">
      <a class="btn" href="Storyteller/">📖 Storyteller</a>
      <!-- Add more apps here -->
    </div>
  </div>
  <footer>&copy; 2026 xiaotaozi1127. All rights reserved.</footer>
</body>
</html>
